<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis, News & Insights | Newark Firm</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-slate-900">
                <a href="index.html">NEWARK<span class="text-slate-500 font-light">FIRM</span></a>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium text-sm tracking-wide text-gray-600 uppercase">
                <a href="people.html" class="hover:text-slate-900 transition">People</a>
                <a href="experience.html" class="hover:text-slate-900 transition">Experience</a>
                <a href="about.html" class="hover:text-slate-900 transition">About Us</a>
                <a href="insights.html" class="text-slate-900 font-bold border-b-2 border-slate-900 pb-1">Insights</a>
                <a href="contact.html" class="hover:text-slate-900 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bg-slate-100 py-12 px-6 border-b border-gray-200">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-semibold text-slate-950">Analysis, News & Insights</h1>
            <p class="text-gray-600 mt-2">Multi-state legal breakdowns, corporate risk updates, and regulatory evaluations for Texas and Oklahoma.</p>
        </div>
    </section>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-16 w-full">
        <div id="blog-posts-container" class="space-y-12">
            <div id="loading" class="text-sm text-gray-400 font-mono">Retrieving latest intelligence data...</div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-8 text-center text-sm w-full">
        <p>&copy; 2026 Newark Firm. All Rights Reserved. <a href="disclaimer.html" class="underline hover:text-white ml-2">Disclaimer</a></p>
    </footer>

    <script>
        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            
            const repoOwner = "robnewark-cpu";
            const repoName = "newarkfirm-site";
            const folderPath = "insights";

            try {
                // Direct call to GitHub API to list files in insights folder
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                
                if (!response.ok) {
                    throw new Error("Repository visibility restriction or folder empty.");
                }
                
                const files = await response.json();
                const htmlFiles = files.filter(file => file.name.endsWith('.html'));

                if (!htmlFiles || htmlFiles.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-400 italic">No published articles found in the directory yet.</p>`;
                    return;
                }

                // Clear out loading text
                container.innerHTML = "";

                // Reverse sort so newest blog posts appear at the top
                htmlFiles.reverse();

                // Inject each blog post file's custom markup directly into the layout feed
                for (let file of htmlFiles) {
                    const contentResponse = await fetch(file.download_url);
                    const articleHTML = await contentResponse.text();

                    const articleWrapper = document.createElement('article');
                    articleWrapper.className = "bg-white p-8 border border-gray-200 shadow-xs rounded-sm max-w-none text-sm leading-relaxed text-gray-600 space-y-4";
                    articleWrapper.innerHTML = articleHTML;

                    container.appendChild(articleWrapper);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="p-6 bg-slate-100 border border-gray-200 text-center">
                        <p class="text-xs text-gray-500 font-medium">Blogging Feed Synchronized</p>
                        <p class="text-xs text-gray-400 mt-2">If your latest entry isn't showing yet, ensure your GitHub repository visibility is set to **Public** in settings.</p>
                    </div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>

</body>
</html>
