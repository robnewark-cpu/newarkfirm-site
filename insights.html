<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis, News & Insights | Newark Firm</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-slate-900">
                <a href="index.html">NEWARK<span class="text-slate-500 font-light">FIRM</span></a>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium text-sm tracking-wide text-gray-600 uppercase">
                <a href="people.html" class="hover:text-slate-900 transition">People</a>
                <a href="experience.html" class="hover:text-slate-900 transition">Experience</a>
                <a href="about.html" class="hover:text-slate-900 transition">About Us</a>
                <a href="insights.html" class="text-slate-900 font-bold border-b-2 border-slate-900 pb-1">Insights</a>
                <a href="contact.html" class="hover:text-slate-900 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bg-slate-100 py-12 px-6 border-b border-gray-200">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-semibold text-slate-950">Analysis, News & Insights</h1>
            <p class="text-gray-600 mt-2 text-sm max-w-xl">Multi-state legal breakdowns, corporate risk updates, and regulatory evaluations for Texas and Oklahoma.</p>
        </div>
    </section>

    <main class="flex-grow max-w-3xl mx-auto px-6 py-16 w-full">
        <div id="blog-posts-container" class="space-y-16">
            <div id="loading" class="text-sm text-gray-400 font-mono tracking-wide">Retrieving latest briefings...</div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-8 text-center text-sm w-full mt-auto">
        <p>&copy; 2026 Newark Firm. All Rights Reserved. <a href="disclaimer.html" class="underline hover:text-white ml-2">Disclaimer</a></p>
    </footer>

    <script>
        function parseMarkdownToHTML(text) {
            let clean = text;
            let extractedTitle = "";
            let extractedDate = "";

            // 1. Isolate Frontmatter Metadata Box
            if (clean.includes('---')) {
                const parts = clean.split('---');
                if (parts.length >= 3) {
                    const frontmatter = parts[1];
                    clean = parts.slice(2).join('---');

                    // Pull explicit text Title
                    const titleMatch = frontmatter.match(/title:\s*(.*)/);
                    if (titleMatch && titleMatch[1]) {
                        extractedTitle = titleMatch[1].replace(/['"]/g, '').trim();
                    }

                    // Pull explicit Publication Date metadata
                    const dateMatch = frontmatter.match(/date:\s*(.*)/);
                    if (dateMatch && dateMatch[1]) {
                        extractedDate = dateMatch[1].replace(/['"]/g, '').trim();
                    }
                }
            }

            // 2. Format Core Typographic Blocks Safely
            let lines = clean.split('\n');
            let outputHtml = "";

            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('###')) {
                    outputHtml += `<h3 class="text-lg font-serif font-semibold text-slate-950 mt-6 mb-2 tracking-tight">${trimmed.replace('###', '').trim()}</h3>`;
                } else if (trimmed.startsWith('##')) {
                    outputHtml += `<h2 class="text-xl font-serif font-semibold text-slate-950 mt-8 mb-3 tracking-tight">${trimmed.replace('##', '').trim()}</h2>`;
                } else if (trimmed.startsWith('-') || trimmed.startsWith('*')) {
                    let content = trimmed.substring(1).trim();
                    outputHtml += `<div class="flex items-start my-2 ml-4 text-gray-600 text-sm"><span class="text-slate-400 mr-2.5 select-none">•</span><p class="flex-1">${content}</p></div>`;
                } else {
                    outputHtml += `<p class="text-gray-600 text-sm leading-relaxed tracking-wide my-4">${trimmed}</p>`;
                }
            });

            outputHtml = outputHtml.replace(/\*\*(.*?)\*\*/g, '<strong class="font-semibold text-slate-950">$1</strong>');
            
            return { html: outputHtml, title: extractedTitle, date: extractedDate };
        }

        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            const repoOwner = "robnewark-cpu";
            const repoName = "newarkfirm-site";
            const folderPath = "insights";

            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}?cb=${cacheBuster}`);
                if (!response.ok) throw new Error("Folder structural sync timed out.");
                
                const files = await response.json();
                if (!Array.isArray(files) || files.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-8">No published articles found in the directory yet.</p>`;
                    return;
                }

                container.innerHTML = "";
                files.reverse();

                for (let file of files) {
                    if (file.name.startsWith('.')) continue;

                    const contentResponse = await fetch(file.download_url);
                    const rawBody = await contentResponse.text();

                    // Fallback configuration parameters if metadata fields are blank
                    let fallbackTitle = file.name.replace(/-\d{4}-\d{2}-\d{2}/, '').replace(/\.md$/, '').replace(/\.html$/, '').replace(/-/g, ' ');
                    fallbackTitle = fallbackTitle.replace(/\b\w/g, c => c.toUpperCase());

                    const parsed = parseMarkdownToHTML(rawBody);
                    
                    const displayTitle = parsed.title || fallbackTitle;
                    // Format date elegantly. If metadata is missing, fallback to current brief marker
                    const displayDate = parsed.date ? new Date(parsed.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : "June 2026 Legal Briefing";

                    const article = document.createElement('article');
                    article.className = "border-l-2 border-slate-900 pl-6 md:pl-8 space-y-4";
                    
                    // UPDATED PRESENTATION STRUCTURE: Headline at the top, clear date directly underneath
                    article.innerHTML = `
                        <div class="space-y-1">
                            <h2 class="text-xl md:text-2xl font-serif font-semibold text-slate-950 tracking-tight leading-snug">
                                ${displayTitle}
                            </h2>
                            <span class="text-[10px] font-mono uppercase tracking-widest text-slate-400 block pt-0.5">
                                Published: ${displayDate}
                            </span>
                        </div>
                        <div class="prose max-w-none text-gray-600 text-sm mt-4">${parsed.html}</div>
                    `;
                    container.appendChild(article);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">Blogging feed refreshed successfully.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
</body>
</html>
