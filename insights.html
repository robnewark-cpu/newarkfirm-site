<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis, News & Insights | Newark Firm</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-slate-900">
                <a href="index.html">NEWARK<span class="text-slate-500 font-light">FIRM</span></a>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium text-sm tracking-wide text-gray-600 uppercase">
                <a href="people.html" class="hover:text-slate-900 transition">People</a>
                <a href="experience.html" class="hover:text-slate-900 transition">Experience</a>
                <a href="about.html" class="hover:text-slate-900 transition">About Us</a>
                <a href="insights.html" class="text-slate-900 font-bold border-b-2 border-slate-900 pb-1">Insights</a>
                <a href="contact.html" class="hover:text-slate-900 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bg-slate-100 py-12 px-6 border-b border-gray-200">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-semibold text-slate-950">Analysis, News & Insights</h1>
            <p class="text-gray-600 mt-2">Multi-state legal breakdowns, corporate risk updates, and regulatory evaluations for Texas and Oklahoma.</p>
        </div>
    </section>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-16 w-full">
        <div id="blog-posts-container" class="space-y-12">
            <div id="loading" class="text-sm text-gray-400 font-mono">Retrieving latest intelligence data...</div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-8 text-center text-sm w-full">
        <p>&copy; 2026 Newark Firm. All Rights Reserved. <a href="disclaimer.html" class="underline hover:text-white ml-2">Disclaimer</a></p>
    </footer>

    <script>
        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            
            const repoOwner = "robnewark-cpu";
            const repoName = "newarkfirm-site";
            const folderPath = "insights";

            try {
                // Fetch directly from the global public API route using a timestamp to bypass proxy caching
                const cacheBuster = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}?cb=${cacheBuster}`);
                
                if (!response.ok) {
                    throw new Error("Repository visibility mismatch or folder structural validation failed.");
                }
                
                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-8">No published articles found in the workspace directory yet.</p>`;
                    return;
                }

                // Clear structural contents on response initialization
                container.innerHTML = "";

                // Reverse array loop sequencing to position newly committed logs at the summit of the feed
                files.reverse();

                for (let file of files) {
                    if (file.name.startsWith('.')) continue;

                    const contentResponse = await fetch(file.download_url);
                    const articleBodyRaw = await contentResponse.text();

                    // Form a presentation box for the asset payload
                    const articleWrapper = document.createElement('article');
                    articleWrapper.className = "bg-white p-8 border border-gray-200 shadow-xs text-sm leading-relaxed text-gray-700 space-y-4 rounded-xs";
                    
                    // Sanitize YAML frontmatter parameters if Pages CMS injected headings into raw data fields
                    let cleanHTML = articleBodyRaw;
                    if (articleBodyRaw.includes('---')) {
                        const structuralSegments = articleBodyRaw.split('---');
                        if (structuralSegments.length >= 3) {
                            cleanHTML = structuralSegments.slice(2).join('---').trim();
                        }
                    }

                    articleWrapper.innerHTML = cleanHTML;
                    container.appendChild(articleWrapper);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="p-8 bg-white border border-gray-200 text-center shadow-xs">
                        <p class="text-xs text-slate-500 font-bold tracking-wide uppercase">Blogging Synchronization Standardized</p>
                        <p class="text-xs text-gray-400 mt-2 leading-relaxed">Verification sequence complete. Confirm your repository's global setting is public or hit refresh to clear application memory.</p>
                    </div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>

</body>
</html>
