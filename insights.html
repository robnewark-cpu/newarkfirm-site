<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis, News & Insights | Newark Firm</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-slate-900">
                <a href="index.html">NEWARK<span class="text-slate-500 font-light">FIRM</span></a>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium text-sm tracking-wide text-gray-600 uppercase">
                <a href="people.html" class="hover:text-slate-900 transition">People</a>
                <a href="experience.html" class="hover:text-slate-900 transition">Experience</a>
                <a href="about.html" class="hover:text-slate-900 transition">About Us</a>
                <a href="insights.html" class="text-slate-900 font-bold border-b-2 border-slate-900 pb-1">Insights</a>
                <a href="contact.html" class="hover:text-slate-900 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bg-slate-100 py-12 px-6 border-b border-gray-200">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-serif font-semibold text-slate-950">Analysis, News & Insights</h1>
            <p class="text-gray-600 mt-2 text-sm max-w-xl">Multi-state legal breakdowns, corporate risk updates, and regulatory evaluations for Texas and Oklahoma.</p>
        </div>
    </section>

    <main class="flex-grow max-w-3xl mx-auto px-6 py-16 w-full">
        <div id="blog-posts-container" class="space-y-16">
            <div id="loading" class="text-sm text-gray-400 font-mono tracking-wide">Retrieving latest briefings...</div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-8 text-center text-sm w-full mt-auto">
        <p>&copy; 2026 Newark Firm. All Rights Reserved. <a href="disclaimer.html" class="underline hover:text-white ml-2">Disclaimer</a></p>
    </footer>

    <script>
        function parseMarkdownToHTML(text) {
            let clean = text;

            // 1. Remove YAML metadata box blocks if any exist
            if (clean.includes('---')) {
                const parts = clean.split('---');
                if (parts.length >= 3) {
                    clean = parts.slice(2).join('---');
                }
            }

            // 2. Format custom markdown headers into bold, clean subheadings
            clean = clean.replace(/^###\s*(.*)$/g_m, '<h3 class="text-lg font-serif font-semibold text-slate-950 mt-6 mb-2 tracking-tight">$1</h3>');
            clean = clean.replace(/^##\s*(.*)$/g_m, '<h2 class="text-xl font-serif font-semibold text-slate-950 mt-8 mb-3 tracking-tight">$1</h2>');

            // 3. Format bullet lists cleanly
            clean = clean.replace(/^\s*[-*]\s*(.*)$/g_m, '<div class="flex items-start my-1.5 ml-4 text-gray-600 text-sm"><span class="text-slate-400 mr-2.5 select-none">•</span><p class="flex-1">$1</p></div>');

            // 4. Format bold keywords safely
            clean = clean.replace(/\*\*(.*?)\*\*/g, '<strong class="font-semibold text-slate-950">$1</strong>');

            // 5. Build native structural paragraph breaks
            const paragraphs = clean.split(/\n{2,}/);
            return paragraphs.map(p => {
                if (p.trim().startsWith('<div') || p.trim().startsWith('<h3') || p.trim().startsWith('<h2')) {
                    return p.trim();
                }
                return p.trim() ? `<p class="text-gray-600 text-sm leading-relaxed tracking-wide my-4">${p.trim()}</p>` : '';
            }).join('');
        }

        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            const repoOwner = "robnewark-cpu";
            const repoName = "newarkfirm-site";
            const folderPath = "insights";

            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}?cb=${cacheBuster}`);
                
                if (!response.ok) throw new Error("Folder verification failed.");
                
                const files = await response.json();
                if (!Array.isArray(files) || files.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-8">No published articles found in the directory yet.</p>`;
                    return;
                }

                container.innerHTML = "";
                files.reverse(); // Newest first

                for (let file of files) {
                    if (file.name.startsWith('.')) continue;

                    const contentResponse = await fetch(file.download_url);
                    const rawBody = await contentResponse.text();

                    // Generate clean human-readable titles from names
                    let displayTitle = file.name.replace(/-\d{4}-\d{2}-\d{2}/, '').replace(/\.md$/, '').replace(/\.html$/, '').replace(/-/g, ' ');
                    displayTitle = displayTitle.replace(/\b\w/g, c => c.toUpperCase());

                    const HTMLPayload = parseMarkdownToHTML(rawBody);

                    const article = document.createElement('article');
                    article.className = "border-l-2 border-slate-900 pl-6 md:pl-8 space-y-4";
                    article.innerHTML = `
                        <div class="space-y-1">
                            <span class="text-[10px] font-mono uppercase tracking-widest text-slate-400 block">Legal Briefing</span>
                            <h2 class="text-xl md:text-2xl font-serif font-semibold text-slate-950 tracking-tight leading-snug">${displayTitle}</h2>
                        </div>
                        <div class="prose max-w-none">${HTMLPayload}</div>
                    `;
                    container.appendChild(article);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">Blogging stream compiled successfully.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
</body>
</html>
